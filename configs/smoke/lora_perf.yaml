# Stronger smoke run aimed at actually lifting accuracy over base:
# more training data + steps + a larger eval set (less noise). Still 0.5B/CPU-friendly.
method: lora
model_name: Qwen/Qwen2.5-0.5B-Instruct

r: 8
alpha: 16.0
target_modules: [q_proj, v_proj]
lora_dropout: 0.0
lora_init: gaussian

train_dataset: medmcqa
train_subset: 2000
eval_datasets: [medmcqa, medqa, pubmedqa]
eval_subset: 100
max_length: 384

lr: 2.0e-4
batch_size: 4
grad_accum: 1
epochs: 1
max_steps: 300
warmup_ratio: 0.03
weight_decay: 0.0
log_every: 50

seed: 42
output_dir: checkpoints/smoke/perf/lora
dtype: float32
