# E4 — Scaling sweep. Fix r=8, alpha/r ∈ {0.5, 1, 2} to isolate the scaling effect.
base: configs/lora_r8_qv.yaml
output_root: checkpoints/sweeps/alpha
runs:
  - {name: scale0p5, alpha: 4.0}   # alpha/r = 0.5
  - {name: scale1,   alpha: 8.0}   # alpha/r = 1.0
  - {name: scale2,   alpha: 16.0}  # alpha/r = 2.0
